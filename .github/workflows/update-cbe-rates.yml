name: Update CBE exchange rates

on:
  # Run once whenever this workflow or project code changes.
  push:
    branches:
      - main
  # GitHub Actions cron is UTC. 22:30 UTC is 12:30 AM Cairo time.
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-rates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update latest exchange rates
        run: python update_rates.py

      - name: Commit updated rates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rates/latest.json

          if git diff --cached --quiet; then
            echo "No exchange-rate changes to commit."
            exit 0
          fi

          git commit -m "Update CBE exchange rates"
          git push
